name: i18n auto-translate

# messages/en.json 이 PR 에서 변경되면 나머지 10개 언어 자동 번역 후 PR에 커밋 추가.
# 모델: Claude Sonnet 4.5 (i18n-ai-translate 경유).
# KO 는 대장 검수용이라 자동 번역 대상 아님 — 필요 시 대장이 수동 수정.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'messages/en.json'

jobs:
  translate:
    # security-auditor MEDIUM: fork PR 에서 lockfile 또는 i18n:translate:all script
    # tampering supply chain 차단. fork 는 ANTHROPIC_API_KEY_TRANSLATION secret 도
    # 받지 못하므로 어차피 무의미. 같은 repo 내 PR 만 실행.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # security-auditor MEDIUM: postinstall script 실행 차단 (lockfile 변경 PR 의
        # 악성 패키지 supply chain 회피). i18n-ai-translate 는 postinstall 없음.
        run: npm ci --ignore-scripts

      - name: Translate 9 languages (es/pt/fr/de/ja/ru/ar/hi + zh→zh-CN)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_TRANSLATION }}
        run: npm run i18n:translate:all

      - name: Commit translations back to PR
        run: |
          git config user.name "claude-i18n-bot"
          git config user.email "noreply@cofounder.co.kr"
          git add messages/
          if git diff --cached --quiet; then
            echo "No translation changes"
          else
            git commit -m "i18n: auto-translate via Claude Sonnet 4.5 (en.json changed)"
            git push
          fi
